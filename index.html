<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简历生成工具</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
  </script>
  <style>
    /* ===== 全局重置与基础 ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #e5e7eb;
    }

    /* ===== 布局 ===== */
    .app-layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ===== 左侧面板 ===== */
    .left-panel {
      width: 55%;
      min-width: 420px;
      background: #f8f9fa;
      overflow-y: auto;
      border-right: 1px solid #e2e4e8;
      padding: 20px 22px 40px;
    }
    .left-panel::-webkit-scrollbar {
      width: 6px;
    }
    .left-panel::-webkit-scrollbar-thumb {
      background: #c0c4cc;
      border-radius: 3px;
    }

    /* ===== 右侧面板 ===== */
    .right-panel {
      flex: 1;
      background: #d1d5db;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .right-panel::-webkit-scrollbar {
      width: 6px;
    }
    .right-panel::-webkit-scrollbar-thumb {
      background: #9ca3af;
      border-radius: 3px;
    }

    /* 缩放控制栏 */
    .zoom-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #d1d5db;
      flex-shrink: 0;
      user-select: none;
    }
    .zoom-bar .zoom-label {
      font-size: 11px;
      font-weight: 500;
      color: #4b5563;
      min-width: 38px;
      text-align: center;
    }
    .zoom-bar .btn-zoom {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #4b5563;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: all 0.12s;
    }
    .zoom-bar .btn-zoom:hover {
      background: #f3f4f6;
      border-color: #9ca3af;
    }
    .zoom-bar .btn-zoom:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* 画布滚动容器 */
    .canvas-scroll-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      position: relative;
    }
    .canvas-scroll-wrap::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .canvas-scroll-wrap::-webkit-scrollbar-thumb {
      background: #9ca3af;
      border-radius: 4px;
    }
    .canvas-scroll-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    /* 缩放容器 */
    .canvas-zoom-container {
      transform-origin: top center;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    /* ===== A4 画布 ===== */
    .a4-canvas {
      width: 210mm;
      min-height: 297mm;
      background: #ffffff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 1px 4px rgba(0, 0, 0, 0.08);
      padding: 20mm 18mm;
      font-family: Arial, Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #1f2937;
      line-height: 1.5;
      position: relative;
      box-sizing: border-box;
    }
    .a4-canvas .resume-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid #1f2937;
    }
    .a4-canvas .resume-header .header-info {
      flex: 1;
    }
    .a4-canvas .resume-header .header-info h1 {
      font-size: 26pt;
      font-weight: 700;
      color: #111827;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .a4-canvas .resume-header .header-info .position-title {
      font-size: 13pt;
      font-weight: 600;
      color: #2563eb;
      margin-bottom: 10px;
    }
    .a4-canvas .resume-header .header-info .contact-info {
      font-size: 9.5pt;
      color: #4b5563;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
    }
    .a4-canvas .resume-header .header-info .contact-info span {
      white-space: nowrap;
    }
    .a4-canvas .resume-header .avatar-wrapper {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid #e5e7eb;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .a4-canvas .resume-header .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .a4-canvas .resume-header .avatar-wrapper .avatar-placeholder {
      font-size: 28pt;
      color: #9ca3af;
      font-weight: 300;
    }

    .a4-canvas .resume-section {
      margin-bottom: 16px;
    }
    .a4-canvas .resume-section .section-title {
      font-size: 12pt;
      font-weight: 700;
      color: #111827;
      letter-spacing: 0.5px;
      padding-bottom: 4px;
      margin-bottom: 10px;
      border-bottom: 1.5px solid #d1d5db;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .a4-canvas .resume-section .section-title .title-bar {
      display: inline-block;
      width: 4px;
      height: 16px;
      background: #2563eb;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .a4-canvas .exp-item {
      margin-bottom: 12px;
    }
    .a4-canvas .exp-item .exp-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2px;
    }
    .a4-canvas .exp-item .exp-header .exp-company {
      font-size: 11pt;
      font-weight: 700;
      color: #1f2937;
    }
    .a4-canvas .exp-item .exp-header .exp-title {
      font-size: 10.5pt;
      font-weight: 600;
      color: #374151;
    }
    .a4-canvas .exp-item .exp-header .exp-date {
      font-size: 9pt;
      color: #6b7280;
      white-space: nowrap;
    }
    .a4-canvas .exp-item .exp-desc {
      font-size: 9.5pt;
      color: #4b5563;
      line-height: 1.6;
      margin-top: 3px;
      white-space: pre-wrap;
    }

    .a4-canvas .edu-item {
      margin-bottom: 8px;
    }
    .a4-canvas .edu-item .edu-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .a4-canvas .edu-item .edu-header .edu-school {
      font-size: 11pt;
      font-weight: 700;
      color: #1f2937;
    }
    .a4-canvas .edu-item .edu-header .edu-major {
      font-size: 10pt;
      color: #374151;
    }
    .a4-canvas .edu-item .edu-header .edu-date {
      font-size: 9pt;
      color: #6b7280;
      white-space: nowrap;
    }
    .a4-canvas .edu-item .edu-degree {
      font-size: 9.5pt;
      color: #4b5563;
    }

    .a4-canvas .skills-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .a4-canvas .skills-tags .skill-tag {
      font-size: 9pt;
      padding: 2px 10px;
      background: #eff6ff;
      color: #1e40af;
      border-radius: 12px;
      border: 1px solid #bfdbfe;
      font-weight: 500;
    }

    /* 空状态占位 */
    .empty-hint {
      font-size: 9pt;
      color: #9ca3af;
      font-style: italic;
    }

    /* ===== 左侧表单样式 ===== */
    .form-section {
      margin-bottom: 18px;
    }
    .form-section .form-section-title {
      font-size: 12px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1.5px solid #2563eb;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .form-section .form-section-title svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      color: #2563eb;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .form-input {
      width: 100%;
      padding: 7px 10px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #1f2937;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }
    .form-textarea {
      width: 100%;
      padding: 7px 10px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #1f2937;
      outline: none;
      resize: vertical;
      min-height: 64px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-grid .full-width {
      grid-column: 1 / -1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      letter-spacing: 0.02em;
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
    }
    .btn-secondary {
      background: #f0f1f3;
      color: #374151;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #e2e4e8;
    }
    .btn-success {
      background: #059669;
      color: #fff;
    }
    .btn-success:hover:not(:disabled) {
      background: #047857;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-danger:hover:not(:disabled) {
      background: #dc2626;
    }
    .btn-sm {
      padding: 4px 8px;
      font-size: 11px;
    }
    .btn-xs {
      padding: 3px 7px;
      font-size: 11px;
      border-radius: 5px;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #d1d5db;
      color: #4b5563;
    }
    .btn-outline:hover:not(:disabled) {
      background: #f3f4f6;
      border-color: #9ca3af;
    }

    .sync-panel {
      background: #ffffff;
      border: 1px solid #e2e4e8;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 20px;
    }
    .sync-panel .sync-title {
      font-size: 12px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .sync-panel .sync-title svg {
      width: 14px;
      height: 14px;
    }
    .sync-panel .sync-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sync-panel .sync-status {
      font-size: 11px;
      color: #6b7280;
      margin-top: 6px;
    }
    .sync-panel .sync-status .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 3px;
      vertical-align: middle;
    }
    .sync-panel .sync-status .status-dot.green {
      background: #10b981;
    }
    .sync-panel .sync-status .status-dot.gray {
      background: #9ca3af;
    }

    /* 经历条目卡片 */
    .entry-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      position: relative;
    }
    .entry-card .entry-remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .entry-card .entry-remove-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }
    .entry-card .entry-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .entry-card .entry-grid .full-width {
      grid-column: 1 / -1;
    }

    .avatar-upload-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-upload-area .avatar-preview {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #e5e7eb;
      background: #f3f4f6;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-upload-area .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .avatar-upload-area .avatar-preview .no-avatar {
      font-size: 20px;
      color: #9ca3af;
    }
    .avatar-upload-area .avatar-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* 技能 Tag 输入 */
    .skills-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      min-height: 38px;
      cursor: text;
      align-items: center;
    }
    .skills-input-wrap .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      padding: 2px 8px;
      background: #eff6ff;
      color: #1e40af;
      border-radius: 10px;
      border: 1px solid #bfdbfe;
    }
    .skills-input-wrap .tag .tag-remove {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      color: #6b7280;
      transition: color 0.15s;
    }
    .skills-input-wrap .tag .tag-remove:hover {
      color: #ef4444;
    }
    .skills-input-wrap .tag-input {
      border: none;
      outline: none;
      font-size: 13px;
      flex: 1;
      min-width: 80px;
      padding: 2px 0;
      font-family: inherit;
      background: transparent;
    }

    /* ===== 打印优化 ===== */
    @media print {
      body {
        background: #fff !important;
        overflow: visible !important;
      }
      .app-layout {
        display: block !important;
        height: auto !important;
      }
      .left-panel,
      .zoom-bar {
        display: none !important;
      }
      .right-panel {
        background: #fff !important;
        overflow: visible !important;
        display: block !important;
      }
      .canvas-scroll-wrap {
        overflow: visible !important;
        padding: 0 !important;
        display: block !important;
      }
      .canvas-zoom-container {
        transform: none !important;
      }
      .a4-canvas {
        width: 100% !important;
        min-height: auto !important;
        box-shadow: none !important;
        padding: 15mm 15mm !important;
        margin: 0 !important;
        page-break-after: avoid;
      }
      .a4-canvas .resume-header .avatar-wrapper {
        border-width: 1px !important;
      }
      @page {
        size: A4;
        margin: 0;
      }
    }

    /* ===== 工具 ===== */
    .mt-2 {
      margin-top: 8px;
    }
    .mb-2 {
      margin-bottom: 8px;
    }
    .gap-2 {
      gap: 8px;
    }
    .flex {
      display: flex;
    }
    .items-center {
      align-items: center;
    }
    .text-xs {
      font-size: 11px;
    }
    .text-gray-400 {
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="app-layout" id="app">

    <!-- ===== 左侧面板 ===== -->
    <div class="left-panel" id="leftPanel">

      <!-- 本地同步控制面板 -->
      <div class="sync-panel">
        <div class="sync-title">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2M7 10l5 5 5-5M12 15V3"/></svg>
          本地同步
        </div>
        <div style="font-size:11px;color:#6b7280;background:#fef3c7;border:1px solid #fde68a;border-radius:5px;padding:6px 10px;margin-bottom:10px;line-height:1.5;">
          🔒 隐私保护：关闭窗口后数据自动清除，不会残留。
          <strong>请务必保存到本地文件</strong>。
        </div>
        <div class="sync-actions">
          <button class="btn btn-primary btn-sm" id="btnNewFile" title="新建一个本地 JSON 简历文件">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M12 5v14m-7-7h14"/></svg>
            新建本地文件
          </button>
          <button class="btn btn-success btn-sm" id="btnSaveFile" title="保存到已关联的本地文件" disabled>
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M5 13l4 4L19 7"/></svg>
            保存到本地
          </button>
          <button class="btn btn-secondary btn-sm" id="btnOpenFile" title="从本地打开一个 JSON 简历文件">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2M7 10l5 5 5-5M12 15V3"/></svg>
            打开本地文件
          </button>
        </div>
        <div class="sync-status" id="syncStatus">
          <span class="status-dot gray"></span>
          未关联本地文件
        </div>
      </div>

      <!-- 简历导出 -->
      <div class="sync-panel">
        <div class="sync-title">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/></svg>
          导出简历
        </div>
        <div class="sync-actions">
          <button class="btn btn-primary btn-sm" id="btnExportPDF" title="导出为 PDF 文件">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M7 21h10a2 2 0 0 0 2-2V9.414a1 1 0 0 0-.293-.707l-5.414-5.414A1 1 0 0 0 12.586 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z"/></svg>
            下载 PDF
          </button>
          <button class="btn btn-success btn-sm" id="btnExportWord" title="导出为 Word 文档">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/></svg>
            下载 Word
          </button>
        </div>
        <div class="sync-status" id="exportStatus">
          <span class="status-dot gray"></span>
          点击按钮即可导出
        </div>
      </div>

      <!-- 基本信息 -->
      <div class="form-section">
        <div class="form-section-title">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM12 14c-4.418 0-8 1.79-8 4v2h16v-2c0-2.21-3.582-4-8-4z"/></svg>
          基本信息
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div>
            <label class="form-label">姓名</label>
            <input class="form-input" id="inputName" placeholder="请输入姓名" />
          </div>
          <div>
            <label class="form-label">求职意向</label>
            <input class="form-input" id="inputPosition" placeholder="如：产品研发经理" />
          </div>
          <div class="form-grid">
            <div>
              <label class="form-label">联系电话</label>
              <input class="form-input" id="inputPhone" placeholder="手机号" />
            </div>
            <div>
              <label class="form-label">电子邮箱</label>
              <input class="form-input" id="inputEmail" placeholder="email@example.com" />
            </div>
            <div class="full-width">
              <label class="form-label">个人网站 / GitHub</label>
              <input class="form-input" id="inputWebsite" placeholder="github.com/yourname" />
            </div>
          </div>
        </div>
      </div>

      <!-- 头像上传 -->

  <script>
    // ================================================================
    //  数据模型与默认初始数据
    // ================================================================

    const DEFAULT_DATA = {
      name: '张明远',
      position: '智能座舱产品研发与用户研究经理',
      phone: '138-0000-1234',
      email: 'mingyuan.zhang@example.com',
      website: 'github.com/mingyuan-zhang',
      avatar: '',
      workExperience: [{
        id: 'w1',
        company: '某全球合规主机厂（欧洲研发中心）',
        title: '高级产品经理 / HCI 研究负责人',
        startDate: '2020-03',
        endDate: '至今',
        description:
          '主导下一代智能座舱 HMI 交互系统从 0 到 1 的产品定义与迭代研发，覆盖语音交互、手势控制、多模感知融合等核心能力。\n• 运用 Kano 模型对 30+ 项潜在座舱功能进行用户需求分层，识别出 8 个"魅力型"功能点，推动产品差异化定位，相关功能采纳率达 92%。\n• 设计并执行跨文化用户实验（N=120），采用 ANOVA 与多元回归分析检验交互模式对驾驶分心与任务完成效率的影响，成果被应用于 2023 款量产车型 HMI 方案。\n• 建立以数据驱动的用户体验度量体系（SUS / NPS / NASA-TLX），季度追踪并推动满意度提升 18%。'
      }, {
        id: 'w2',
        company: '某 Tier-1 智能座舱供应商（上海）',
        title: '产品研发经理',
        startDate: '2019-07',
        endDate: '2020-02',
        description:
          '负责车载信息娱乐系统中间件产品规划与交付，协调跨国研发团队（中 / 德 / 美）推进敏捷迭代。\n• 引入回归分析模型对用户行为日志进行因子分析，识别出高价值功能路径，优化信息架构层级，核心任务操作步数平均减少 37%。\n• 推动基于 HMI 原型可用性测试的快速迭代流程，将版本交付周期从 8 周压缩至 4 周，缺陷率同比下降 45%。'
      }],
      education: [{
        id: 'e1',
        school: '英国帝国理工学院 (Imperial College London)',
        major: '人机交互 (MSc Human-Computer Interaction)',
        degree: '硕士',
        startDate: '2017-09',
        endDate: '2019-06'
      }, {
        id: 'e2',
        school: '浙江大学',
        major: '工业设计 (工学学士)',
        degree: '学士',
        startDate: '2013-09',
        endDate: '2017-06'
      }],
      skills: '用户研究, Kano模型, ANOVA, 回归分析, 交互设计, 可用性测试, 产品策略, 数据分析, 原型设计, 敏捷管理'
    };

    // ================================================================
    //  状态管理
    // ================================================================

    let data = {};
    let nextWorkId = 100;
    let nextEduId = 100;
    let fileHandle = null; // 关联的本地文件句柄

    // DOM 引用
    const $ = id => document.getElementById(id);
    const inputName = $('inputName');
    const inputPosition = $('inputPosition');
    const inputPhone = $('inputPhone');
    const inputEmail = $('inputEmail');
    const inputWebsite = $('inputWebsite');
    const workListEl = $('workList');
    const eduListEl = $('eduList');
    const a4Canvas = $('a4Canvas');
    const skillsInput = $('skillsInput');
    const skillsTags = $('skillsTags');
    const avatarFileInput = $('avatarFileInput');
    const avatarPreviewImg = $('avatarPreviewImg');
    const avatarPlaceholder = $('avatarPlaceholder');
    const btnUploadAvatar = $('btnUploadAvatar');
    const btnRemoveAvatar = $('btnRemoveAvatar');
    const btnNewFile = $('btnNewFile');
    const btnSaveFile = $('btnSaveFile');
    const btnOpenFile = $('btnOpenFile');
    const syncStatus = $('syncStatus');
    const btnAddWork = $('btnAddWork');
    const btnAddEdu = $('btnAddEdu');
    const btnExportPDF = $('btnExportPDF');
    const btnExportWord = $('btnExportWord');
    const exportStatus = $('exportStatus');
    const zoomIn = $('zoomIn');
    const zoomOut = $('zoomOut');
    const zoomReset = $('zoomReset');
    const zoomLabel = $('zoomLabel');
    const canvasZoomContainer = $('canvasZoomContainer');
    const canvasScrollWrap = $('canvasScrollWrap');

    // ================================================================
    //  工具函数
    // ================================================================

    function generateId(prefix) {
      return prefix + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    }

    function formatDateRange(start, end) {
      if (!start && !end) return '';
      const s = start || '…';
      const e = end || '至今';
      return s + ' — ' + e;
    }

    /** 按时间降序排列（最新的排最前） */
    function sortByDate(arr) {
      arr.sort((a, b) => {
        const val = (s) => {
          if (!s || s === '至今') return '9999-99';
          return s;
        };
        // 主：endDate 降序
        const endDiff = val(b.endDate).localeCompare(val(a.endDate));
        if (endDiff !== 0) return endDiff;
        // 次：startDate 降序
        return val(b.startDate).localeCompare(val(a.startDate));
      });
    }

    // ================================================================
    //  LocalStorage 持久化（隐私安全模式：不持久存储）
    // ================================================================

    function saveToStorage() {
      // 隐私安全：不将数据写入 LocalStorage
      // 关闭窗口后数据自动消失，用户需主动保存到本地文件
    }

    function loadFromStorage() {
      // 隐私安全：不从 LocalStorage 恢复数据
      return null;
    }

    // ================================================================
    //  File System Access API — 本地文件同步
    // ================================================================

    function updateSyncStatus(connected, fileName) {
      if (connected && fileName) {
        syncStatus.innerHTML =
          '<span class="status-dot green"></span>已关联：<strong>' +
          escHtml(fileName) + '</strong>';
        btnSaveFile.disabled = false;
      } else {
        syncStatus.innerHTML = '<span class="status-dot gray"></span>未关联本地文件';
        btnSaveFile.disabled = true;
      }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // 将当前数据写入已关联的文件句柄
    async function writeToFileHandle(handle) {
      const json = JSON.stringify(data, null, 2);
      const writable = await handle.createWritable();
      await writable.write(json);
      await writable.close();
    }

    // 新建本地文件
    btnNewFile.addEventListener('click', async () => {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'my_resume.json',
          types: [{
            description: 'JSON Ressource',
            accept: { 'application/json': ['.json'] }
          }]
        });
        fileHandle = handle;
        await writeToFileHandle(handle);
        updateSyncStatus(true, handle.name);
        window._syncFileName = handle.name;
      } catch (err) {
        if (err.name === 'AbortError' || err.name === 'SecurityError') {
          // 用户取消 —— 静默处理
        } else {
          console.warn('新建文件失败:', err);
          alert('无法创建文件: ' + err.message);
        }
      }
    });

    // 保存到本地文件
    btnSaveFile.addEventListener('click', async () => {
      if (!fileHandle) {
        alert('请先点击"新建本地文件"关联一个文件。');
        return;
      }
      try {
        // 先验证权限
        const opts = { mode: 'readwrite' };
        if ((await fileHandle.queryPermission(opts)) !== 'granted') {
          if ((await fileHandle.requestPermission(opts)) !== 'granted') {
            alert('未获得文件写入权限，请重新关联文件。');
            fileHandle = null;
            updateSyncStatus(false);
            return;
          }
        }
        await writeToFileHandle(fileHandle);
        // 短暂反馈
        const orig = btnSaveFile.textContent;
        btnSaveFile.textContent = '✓ 已保存';
        setTimeout(() => { btnSaveFile.textContent = orig; }, 1500);
      } catch (err) {
        console.warn('保存失败:', err);
        alert('保存失败: ' + err.message);
      }
    });

    // 从本地文件打开
    btnOpenFile.addEventListener('click', async () => {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{
            description: 'JSON Ressource',
            accept: { 'application/json': ['.json'] }
          }],
          multiple: false
        });
        const file = await handle.getFile();
        const text = await file.text();
        const parsed = JSON.parse(text);
        // 填充数据
        data = normalizeLoadedData(parsed);
        // 按时间排降序
        if (data.workExperience) sortByDate(data.workExperience);
        if (data.education) sortByDate(data.education);
        renderAll();
        saveToStorage();
        fileHandle = handle;
        updateSyncStatus(true, handle.name);
      } catch (err) {
        if (err.name === 'AbortError' || err.name === 'SecurityError') {
          // 用户取消
        } else if (err instanceof SyntaxError) {
          alert('文件格式错误，请选择有效的 JSON 简历文件。');
        } else {
          console.warn('打开文件失败:', err);
          alert('无法打开文件: ' + err.message);
        }
      }
    });

    function normalizeLoadedData(parsed) {
      return {
        name: parsed.name || '',
        position: parsed.position || '',
        phone: parsed.phone || '',
        email: parsed.email || '',
        website: parsed.website || '',
        avatar: parsed.avatar || '',
        workExperience: Array.isArray(parsed.workExperience) ? parsed.workExperience : [],
        education: Array.isArray(parsed.education) ? parsed.education : [],
        skills: parsed.skills || ''
      };
    }

    // ================================================================
    //  头像处理
    // ================================================================

    btnUploadAvatar.addEventListener('click', () => {
      avatarFileInput.click();
    });

    btnRemoveAvatar.addEventListener('click', () => {
      data.avatar = '';
      renderAvatarPreview();
      renderCanvas();
      saveToStorage();
      autoSyncToFile();
    });

    avatarFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        data.avatar = ev.target.result;
        renderAvatarPreview();
        renderCanvas();
        saveToStorage();
        autoSyncToFile();
      };
      reader.readAsDataURL(file);
      avatarFileInput.value = '';
    });

    function renderAvatarPreview() {
      if (data.avatar) {
        avatarPreviewImg.src = data.avatar;
        avatarPreviewImg.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
        btnRemoveAvatar.style.display = 'inline-flex';
      } else {
        avatarPreviewImg.style.display = 'none';
        avatarPlaceholder.style.display = 'inline';
        btnRemoveAvatar.style.display = 'none';
      }
    }

    // ================================================================
    //  技能输入（标签模式）
    // ================================================================

    let skillsList = [];

    function parseSkills(text) {
      return text.split(/[,，\n]/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function renderSkillsTags() {
      skillsTags.innerHTML = '';
      skillsList.forEach((skill, idx) => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.innerHTML = escHtml(skill) +
          ' <span class="tag-remove" data-idx="' + idx + '">×</span>';
        tag.querySelector('.tag-remove').addEventListener('click', (e) => {
          e.stopPropagation();
          skillsList.splice(idx, 1);
          data.skills = skillsList.join(', ');
          renderSkillsTags();
          renderCanvas();
          saveToStorage();
          autoSyncToFile();
        });
        skillsTags.appendChild(tag);
      });
    }

    skillsInput.addEventListener('input', () => {
      const val = skillsInput.value;
      // 如果输入了逗号或回车符号，则提交
      if (val.includes(',') || val.includes('，') || val.includes('\n')) {
        const parts = parseSkills(val);
        parts.forEach(p => {
          if (p && !skillsList.includes(p)) {
            skillsList.push(p);
          }
        });
        data.skills = skillsList.join(', ');
        skillsInput.value = '';
        renderSkillsTags();
        renderCanvas();
        saveToStorage();
        autoSyncToFile();
      }
    });

    skillsInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = skillsInput.value.trim();
        if (val && !skillsList.includes(val)) {
          skillsList.push(val);
          data.skills = skillsList.join(', ');
          skillsInput.value = '';
          renderSkillsTags();
          renderCanvas();
          saveToStorage();
          autoSyncToFile();
        }
      }
      if (e.key === 'Backspace' && skillsInput.value === '' && skillsList.length > 0) {
        skillsList.pop();
        data.skills = skillsList.join(', ');
        renderSkillsTags();
        renderCanvas();
        saveToStorage();
        autoSyncToFile();
      }
    });

    // 点击外部区域时，提交未确认的输入
    skillsInput.addEventListener('blur', () => {
      const val = skillsInput.value.trim();
      if (val && !skillsList.includes(val)) {
        skillsList.push(val);
        data.skills = skillsList.join(', ');
        skillsInput.value = '';
        renderSkillsTags();
        renderCanvas();
        saveToStorage();
        autoSyncToFile();
      }
    });

    // ================================================================
    //  动态表单渲染
    // ================================================================

    function renderWorkEntries() {
      workListEl.innerHTML = '';
      if (!data.workExperience || data.workExperience.length === 0) {
        workListEl.innerHTML = '<div class="empty-hint">暂无工作经历，点击"+ 添加"开始</div>';
        return;
      }
      data.workExperience.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.dataset.idx = idx;
        card.innerHTML = `
          <button class="entry-remove-btn" data-action="remove-work" data-idx="${idx}" title="删除此项">✕</button>
          <div class="entry-grid">
            <div>
              <label class="form-label">公司名称</label>
              <input class="form-input work-field" data-idx="${idx}" data-field="company" value="${escHtml(item.company || '')}" />
            </div>
            <div>
              <label class="form-label">职位名称</label>
              <input class="form-input work-field" data-idx="${idx}" data-field="title" value="${escHtml(item.title || '')}" />
            </div>
            <div>
              <label class="form-label">开始时间</label>
              <input type="month" class="form-input work-field" data-idx="${idx}" data-field="startDate" value="${escHtml(item.startDate || '')}" />
            </div>
            <div>
              <label class="form-label">结束时间</label>
              <input type="month" class="form-input work-field" data-idx="${idx}" data-field="endDate" value="${escHtml(item.endDate || '')}" />
            </div>
            <div class="full-width">
              <label class="form-label">核心工作内容与量化成果</label>
              <textarea class="form-textarea work-field" data-idx="${idx}" data-field="description" rows="4">${escHtml(item.description || '')}</textarea>
            </div>
          </div>
        `;
        workListEl.appendChild(card);
      });

      // 绑定事件
      document.querySelectorAll('.work-field').forEach(el => {
        el.addEventListener('input', handleWorkFieldChange);
      });
      document.querySelectorAll('[data-action="remove-work"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          data.workExperience.splice(idx, 1);
          sortByDate(data.workExperience);
          renderWorkEntries();
          renderCanvas();
          saveToStorage();
          autoSyncToFile();
        });
      });
    }

    function handleWorkFieldChange(e) {
      const el = e.target;
      const idx = parseInt(el.dataset.idx);
      const field = el.dataset.field;
      if (data.workExperience[idx]) {
        data.workExperience[idx][field] = el.value;
        sortByDate(data.workExperience);
        renderWorkEntries();
        renderCanvas();
        saveToStorage();
        autoSyncToFile();
      }
    }

    function renderEduEntries() {
      eduListEl.innerHTML = '';
      if (!data.education || data.education.length === 0) {
        eduListEl.innerHTML = '<div class="empty-hint">暂无教育经历，点击"+ 添加"开始</div>';
        return;
      }
      data.education.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.dataset.idx = idx;
        card.innerHTML = `
          <button class="entry-remove-btn" data-action="remove-edu" data-idx="${idx}" title="删除此项">✕</button>
          <div class="entry-grid">
            <div>
              <label class="form-label">学校名称</label>
              <input class="form-input edu-field" data-idx="${idx}" data-field="school" value="${escHtml(item.school || '')}" />
            </div>
            <div>
              <label class="form-label">专业名称</label>
              <input class="form-input edu-field" data-idx="${idx}" data-field="major" value="${escHtml(item.major || '')}" />
            </div>
            <div>
              <label class="form-label">学位</label>
              <input class="form-input edu-field" data-idx="${idx}" data-field="degree" value="${escHtml(item.degree || '')}" />
            </div>
            <div style="display:flex;gap:8px;">
              <div style="flex:1;">
                <label class="form-label">开始时间</label>
                <input type="month" class="form-input edu-field" data-idx="${idx}" data-field="startDate" value="${escHtml(item.startDate || '')}" />
              </div>
              <div style="flex:1;">
                <label class="form-label">结束时间</label>
                <input type="month" class="form-input edu-field" data-idx="${idx}" data-field="endDate" value="${escHtml(item.endDate || '')}" />
              </div>
            </div>
          </div>
        `;
        eduListEl.appendChild(card);
      });

      document.querySelectorAll('.edu-field').forEach(el => {
        el.addEventListener('input', handleEduFieldChange);
      });
      document.querySelectorAll('[data-action="remove-edu"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          data.education.splice(idx, 1);
          sortByDate(data.education);
          renderEduEntries();
          renderCanvas();
          saveToStorage();
          autoSyncToFile();
        });
      });
    }

    function handleEduFieldChange(e) {
      const el = e.target;
      const idx = parseInt(el.dataset.idx);
      const field = el.dataset.field;
      if (data.education[idx]) {
        data.education[idx][field] = el.value;
        sortByDate(data.education);
        renderEduEntries();
        renderCanvas();
        saveToStorage();
        autoSyncToFile();
      }
    }

    // 添加工作
    btnAddWork.addEventListener('click', () => {
      if (!data.workExperience) data.workExperience = [];
      data.workExperience.push({
        id: generateId('w'),
        company: '',
        title: '',
        startDate: '',
        endDate: '',
        description: ''
      });
      // 新条目排在最后，无需排序，但为了一致性仍调用
      sortByDate(data.workExperience);
      renderWorkEntries();
      renderCanvas();
      saveToStorage();
      autoSyncToFile();
    });

    // 添加教育
    btnAddEdu.addEventListener('click', () => {
      if (!data.education) data.education = [];
      data.education.push({
        id: generateId('e'),
        school: '',
        major: '',
        degree: '',
        startDate: '',
        endDate: ''
      });
      sortByDate(data.education);
      renderEduEntries();
      renderCanvas();
      saveToStorage();
      autoSyncToFile();
    });

    // ================================================================
    //  基本输入绑定
    // ================================================================

    function bindBasicInputs() {
      const fields = [
        { el: inputName, key: 'name' },
        { el: inputPosition, key: 'position' },
        { el: inputPhone, key: 'phone' },
        { el: inputEmail, key: 'email' },
        { el: inputWebsite, key: 'website' },
      ];
      fields.forEach(({ el, key }) => {
        el.addEventListener('input', () => {
          data[key] = el.value;
          renderCanvas();
          saveToStorage();
          autoSyncToFile();
        });
      });
    }

    // ================================================================
    //  A4 画布渲染
    // ================================================================

    function renderCanvas() {
      const d = data;
      const hasAvatar = !!d.avatar;
      const skills = parseSkills(d.skills || '');
      const hasWork = d.workExperience && d.workExperience.length > 0;
      const hasEdu = d.education && d.education.length > 0;

      let html = '';

      // === 头部 ===
      html += '<div class="resume-header">';
      html += '<div class="header-info">';
      html += '<h1>' + escHtml(d.name || '（姓名）') + '</h1>';
      html += '<div class="position-title">' + escHtml(d.position || '') + '</div>';
      html += '<div class="contact-info">';
      if (d.phone) html += '<span>📞 ' + escHtml(d.phone) + '</span>';
      if (d.email) html += '<span>✉️ ' + escHtml(d.email) + '</span>';
      if (d.website) html += '<span>🔗 ' + escHtml(d.website) + '</span>';
      html += '</div>';
      html += '</div>';
      // 头像
      html += '<div class="avatar-wrapper">';
      if (hasAvatar) {
        html += '<img src="' + escHtml(d.avatar) + '" alt="头像" />';
      } else {
        html += '<span class="avatar-placeholder">👤</span>';
      }
      html += '</div>';
      html += '</div>';

      // === 工作经历 ===
      if (hasWork) {
        html += '<div class="resume-section">';
        html += '<div class="section-title"><span class="title-bar"></span>工作经历</div>';
        d.workExperience.forEach(item => {
          if (!item.company && !item.title) return;
          html += '<div class="exp-item">';
          html += '<div class="exp-header">';
          html += '<span class="exp-company">' + escHtml(item.company || '') + '</span>';
          if (item.title) html += '<span class="exp-title">' + escHtml(item.title) + '</span>';
          html += '<span class="exp-date">' + formatDateRange(item.startDate, item.endDate) +
            '</span>';
          html += '</div>';
          if (item.description) {
            html += '<div class="exp-desc">' + escHtml(item.description) + '</div>';
          }
          html += '</div>';
        });
        html += '</div>';
      }

      // === 教育经历 ===
      if (hasEdu) {
        html += '<div class="resume-section">';
        html += '<div class="section-title"><span class="title-bar"></span>教育经历</div>';
        d.education.forEach(item => {
          if (!item.school) return;
          html += '<div class="edu-item">';
          html += '<div class="edu-header">';
          html += '<span class="edu-school">' + escHtml(item.school) + '</span>';
          if (item.major) html += '<span class="edu-major">' + escHtml(item.major) + '</span>';
          html += '<span class="edu-date">' + formatDateRange(item.startDate, item.endDate) +
            '</span>';
          html += '</div>';
          if (item.degree) {
            html += '<div class="edu-degree">' + escHtml(item.degree) + '</div>';
          }
          html += '</div>';
        });
        html += '</div>';
      }

      // === 核心技能 ===
      if (skills.length > 0) {
        html += '<div class="resume-section">';
        html += '<div class="section-title"><span class="title-bar"></span>核心技能</div>';
        html += '<div class="skills-tags">';
        skills.forEach(s => {
          html += '<span class="skill-tag">' + escHtml(s) + '</span>';
        });
        html += '</div>';
        html += '</div>';
      }

      a4Canvas.innerHTML = html;
    }

    // ================================================================
    //  全量渲染 & 初始化
    // ================================================================

    function renderAll() {
      // 填充表单
      inputName.value = data.name || '';
      inputPosition.value = data.position || '';
      inputPhone.value = data.phone || '';
      inputEmail.value = data.email || '';
      inputWebsite.value = data.website || '';

      // 头像
      renderAvatarPreview();

      // 技能
      skillsList = parseSkills(data.skills || '');
      renderSkillsTags();
      skillsInput.value = '';

      // 工作 & 教育
      renderWorkEntries();
      renderEduEntries();

      // 画布
      renderCanvas();
    }

    function autoSyncToFile() {
      if (!fileHandle) return;
      // 带防抖：最后一次修改后 2 秒自动同步
      if (window._syncTimer) clearTimeout(window._syncTimer);
      window._syncTimer = setTimeout(async () => {
        try {
          const opts = { mode: 'readwrite' };
          if ((await fileHandle.queryPermission(opts)) !== 'granted') {
            // 权限丢失，不静默写入，也不弹错误
            return;
          }
          await writeToFileHandle(fileHandle);
        } catch (err) {
          // 静默失败 —— 用户下次手动保存即可
        }
      }, 2000);
    }

    // ================================================================
    //  简历导出（PDF / Word）
    // ================================================================

    function setExportStatus(msg, ok) {
      exportStatus.innerHTML =
        '<span class="status-dot ' + (ok ? 'green' : 'gray') + '"></span>' + escHtml(msg);
    }

    /** 下载 PDF（使用 html2canvas + jsPDF） */
    async function downloadPDF() {
      const canvasEl = document.getElementById('a4Canvas');
      if (!canvasEl) return;
      try {
        setExportStatus('正在生成 PDF…', false);
        btnExportPDF.disabled = true;

        // 用 html2canvas 截取 A4 画布
        const canvas = await html2canvas(canvasEl, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false
        });

        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'portrait',
          unit: 'mm',
          format: 'a4'
        });

        const pdfW = 210;
        const pdfH = 297;
        // 图片等比例适配 A4
        const imgW = canvas.width;
        const imgH = canvas.height;
        const ratio = Math.min(pdfW / imgW, pdfH / imgH);
        const finalW = imgW * ratio;
        const finalH = imgH * ratio;
        const x = (pdfW - finalW) / 2;
        const y = (pdfH - finalH) / 2;

        pdf.addImage(imgData, 'JPEG', x, y, finalW, finalH);
        pdf.save(data.name ? data.name + '_简历.pdf' : '简历.pdf');

        setExportStatus('PDF 已下载 ✓', true);
      } catch (err) {
        console.warn('PDF 导出失败:', err);
        setExportStatus('PDF 导出失败: ' + err.message, false);
      } finally {
        btnExportPDF.disabled = false;
      }
    }

    /**
     * 将文本中的 bullet 行（以 • 开头）转换为 Word 兼容的 <ul><li>
     * 非 bullet 行保留为普通段落
     */
    function textToWordHtml(text) {
      if (!text) return '';
      var lines = text.split('\n');
      var result = '';
      var inList = false;
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (line.startsWith('•') || line.startsWith('- ') || line.startsWith('* ')) {
          // 去除前导符号
          var content = line.replace(/^[•\-*]\s*/, '');
          if (!inList) { result += '<ul style="margin:3px 0 3px 14px;padding:0;">'; inList = true; }
          result += '<li style="font-size:9.5pt;color:#4b5563;line-height:1.6;margin-bottom:1px;">' + escHtml(content) + '</li>';
        } else {
          if (inList) { result += '</ul>'; inList = false; }
          if (line) {
            result += '<div style="font-size:9.5pt;color:#4b5563;line-height:1.6;margin-top:2px;">' + escHtml(line) + '</div>';
          }
        }
      }
      if (inList) result += '</ul>';
      return result;
    }

    /** 下载 Word（生成兼容 Word 的 HTML 文档，保存为 .doc） */
    function downloadWord() {
      try {
        setExportStatus('正在生成 Word 文档…', false);
        btnExportWord.disabled = true;

        var d = data;
        var name = d.name || '简历';
        var skillsList = parseSkills(d.skills || '');
        var hasAvatar = !!d.avatar;

        // ====== 构建 Word 兼容 HTML（避免 flexbox / gap / border-radius 等） ======
        var bodyHTML = '';

        // --- 头部：用表格布局（Word 最稳） ---
        var headerHTML = '';
        // 左侧：姓名 + 信息
        var leftCol = '';
        leftCol += '<div style="font-size:24pt;font-weight:700;color:#111827;margin:0;">' + escHtml(name) + '</div>';
        if (d.position) {
          leftCol += '<div style="font-size:12pt;font-weight:600;color:#2563eb;margin:4px 0 2px 0;">' + escHtml(d.position) + '</div>';
        }
        var contacts = [];
        if (d.phone) contacts.push(escHtml(d.phone));
        if (d.email) contacts.push(escHtml(d.email));
        if (d.website) contacts.push(escHtml(d.website));
        leftCol += '<div style="font-size:9pt;color:#4b5563;">' + contacts.join('&nbsp;&nbsp;|&nbsp;&nbsp;') + '</div>';

        if (hasAvatar) {
          headerHTML += '<table cellpadding="0" cellspacing="0" style="width:100%;border-bottom:2px solid #1f2937;padding-bottom:12px;margin-bottom:16px;"><tr>';
          headerHTML += '<td style="vertical-align:top;">' + leftCol + '</td>';
          headerHTML += '<td style="width:80px;vertical-align:top;text-align:right;">';
          headerHTML += '<div style="width:76px;height:76px;border:2px solid #e5e7eb;">';
          headerHTML += '<img src="' + escHtml(d.avatar) + '" style="width:76px;height:76px;display:block;" />';
          headerHTML += '</div></td></tr></table>';
        } else {
          headerHTML += '<div style="border-bottom:2px solid #1f2937;padding-bottom:12px;margin-bottom:16px;">' + leftCol + '</div>';
        }
        bodyHTML += headerHTML;

        // --- 工作经历 ---
        if (d.workExperience && d.workExperience.length > 0) {
          bodyHTML += '<div style="margin-bottom:14px;">';
          bodyHTML += '<div style="font-size:13pt;font-weight:700;color:#111827;border-bottom:1.5px solid #d1d5db;padding-bottom:3px;margin-bottom:8px;">工作经历</div>';
          d.workExperience.forEach(function(item) {
            if (!item.company && !item.title) return;
            // 公司 + 职位 + 日期：用三列表格
            bodyHTML += '<table cellpadding="0" cellspacing="0" style="width:100%;margin-bottom:8px;"><tr>';
            bodyHTML += '<td style="font-size:10.5pt;font-weight:700;color:#1f2937;padding:0;">' + escHtml(item.company || '') + '</td>';
            bodyHTML += '<td style="font-size:9.5pt;font-weight:600;color:#374151;padding:0 8px;text-align:center;white-space:nowrap;">' + escHtml(item.title || '') + '</td>';
            bodyHTML += '<td style="font-size:8.5pt;color:#6b7280;padding:0;text-align:right;white-space:nowrap;">' + formatDateRange(item.startDate, item.endDate) + '</td>';
            bodyHTML += '</tr></table>';
            // 工作描述：bullet -> ul/li
            if (item.description) {
              bodyHTML += textToWordHtml(item.description);
            }
          });
          bodyHTML += '</div>';
        }

        // --- 教育经历 ---
        if (d.education && d.education.length > 0) {
          bodyHTML += '<div style="margin-bottom:14px;">';
          bodyHTML += '<div style="font-size:13pt;font-weight:700;color:#111827;border-bottom:1.5px solid #d1d5db;padding-bottom:3px;margin-bottom:8px;">教育经历</div>';
          d.education.forEach(function(item) {
            if (!item.school) return;
            bodyHTML += '<table cellpadding="0" cellspacing="0" style="width:100%;margin-bottom:4px;"><tr>';
            bodyHTML += '<td style="font-size:10.5pt;font-weight:700;color:#1f2937;padding:0;">' + escHtml(item.school) + '</td>';
            bodyHTML += '<td style="font-size:9.5pt;color:#374151;padding:0 8px;text-align:center;white-space:nowrap;">' + escHtml(item.major || '') + '</td>';
            bodyHTML += '<td style="font-size:8.5pt;color:#6b7280;padding:0;text-align:right;white-space:nowrap;">' + formatDateRange(item.startDate, item.endDate) + '</td>';
            bodyHTML += '</tr></table>';
            if (item.degree) {
              bodyHTML += '<div style="font-size:9pt;color:#4b5563;margin-bottom:4px;">' + escHtml(item.degree) + '</div>';
            }
          });
          bodyHTML += '</div>';
        }

        // --- 核心技能（不用 flexbox，纯 inline-block + margin） ---
        if (skillsList.length > 0) {
          bodyHTML += '<div style="margin-bottom:14px;">';
          bodyHTML += '<div style="font-size:13pt;font-weight:700;color:#111827;border-bottom:1.5px solid #d1d5db;padding-bottom:3px;margin-bottom:8px;">核心技能</div>';
          bodyHTML += '<div style="line-height:2.0;">';
          skillsList.forEach(function(s) {
            bodyHTML += '<span style="font-size:9pt;padding:2px 10px;background-color:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;display:inline-block;margin:2px 4px 2px 0;mso-border-alt:none;mso-padding-alt:0;">' + escHtml(s) + '</span>';
          });
          bodyHTML += '</div></div>';
        }

        var fullHTML = '<!DOCTYPE html>\n<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">\n<head>\n<meta charset="UTF-8">\n<title>' + escHtml(name) + ' - 简历</title>\n<style>\n@page { size: A4; margin: 15mm 18mm; }\nbody { font-family: Arial, Helvetica, "PingFang SC", "Microsoft YaHei", sans-serif; color: #1f2937; line-height: 1.5; font-size: 10pt; }\nul { margin:2px 0 2px 16px; padding:0; }\nli { margin-bottom:1px; }\n</style>\n</head>\n<body>\n' + bodyHTML + '\n</body>\n</html>';

        // 下载为 .doc
        var blob = new Blob([fullHTML], { type: 'application/msword;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = name + '_简历.doc';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        setExportStatus('Word 已下载 ✓', true);
      } catch (err) {
        console.warn('Word 导出失败:', err);
        setExportStatus('Word 导出失败: ' + err.message, false);
      } finally {
        btnExportWord.disabled = false;
      }
    }

    // 绑定导出按钮
    btnExportPDF.addEventListener('click', downloadPDF);
    btnExportWord.addEventListener('click', downloadWord);

    // ================================================================
    //  隐私安全：关闭提醒
    // ================================================================

    /** 标记数据是否已被用户主动保存过 */
    let hasSavedLocally = false;

    // 监听本地文件保存动作，标记已保存
    btnSaveFile.addEventListener('click', () => { hasSavedLocally = true; });
    btnNewFile.addEventListener('click', () => {
      // 新建后立即写入，算已保存
      setTimeout(() => { hasSavedLocally = true; }, 500);
    });

    window.addEventListener('beforeunload', (e) => {
      if (hasSavedLocally) return; // 已保存则不打扰
      // 标准 beforeunload 提示
      e.preventDefault();
      e.returnValue =
        '您的简历数据尚未保存到本地文件，关闭后数据将丢失。\n\n' +
        '建议：点击左侧「新建本地文件」或「保存到本地」按钮，将数据保存为 .json 文件。';
    });

    // ================================================================
    //  缩放控制
    // ================================================================

    let zoomLevel = 1.0;
    const ZOOM_MIN = 0.3;
    const ZOOM_MAX = 2.0;
    const ZOOM_STEP = 0.1;

    function applyZoom() {
      canvasZoomContainer.style.transform = 'scale(' + zoomLevel + ')';
      zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
      zoomOut.disabled = zoomLevel <= ZOOM_MIN;
      zoomIn.disabled = zoomLevel >= ZOOM_MAX;
    }

    zoomIn.addEventListener('click', () => {
      zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP);
      applyZoom();
    });

    zoomOut.addEventListener('click', () => {
      zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP);
      applyZoom();
    });

    zoomReset.addEventListener('click', () => {
      zoomLevel = 1.0;
      applyZoom();
      // 重置滚动位置到顶部居中
      canvasScrollWrap.scrollTop = 0;
      canvasScrollWrap.scrollLeft = (canvasScrollWrap.scrollWidth - canvasScrollWrap.clientWidth) / 2;
    });

    // 鼠标滚轮缩放（按住 Ctrl）
    canvasScrollWrap.addEventListener('wheel', (e) => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
      zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel + delta));
      applyZoom();
    }, { passive: false });

    // ================================================================
    //  初始化
    // ================================================================

    function init() {
      // 隐私安全：始终使用默认示例数据，不从 LocalStorage 恢复
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      // 确保 ID
      data.workExperience.forEach(item => { if (!item.id) item.id = generateId('w'); });
      data.education.forEach(item => { if (!item.id) item.id = generateId('e'); });

      // 按时间排降序
      if (data.workExperience) sortByDate(data.workExperience);
      if (data.education) sortByDate(data.education);

      bindBasicInputs();
      renderAll();
    }

    init();
  </script>
